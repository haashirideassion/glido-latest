<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          var c = localStorage.getItem('glido_brand_color');
          if (c && /^#[0-9A-Fa-f]{6}$/.test(c)) {
            var r = parseInt(c.slice(1,3),16);
            var g = parseInt(c.slice(3,5),16);
            var b = parseInt(c.slice(5,7),16);
            document.documentElement.style.setProperty('--brand-color', c);
            document.documentElement.style.setProperty('--brand-rgb', r+','+g+','+b);
            var lum = (0.2126*Math.pow(r/255,2.2) + 0.7152*Math.pow(g/255,2.2) + 0.0722*Math.pow(b/255,2.2));
            var cBlack = (lum + 0.05) / 0.05;
            var cWhite = 1.05 / (lum + 0.05);
            document.documentElement.style.setProperty('--brand-text', cBlack >= cWhite ? '#000000' : '#ffffff');
          }
        } catch(e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glido — CFS Booking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&display=swap" rel="stylesheet" />
    <!-- ECharts for sparklines + bar chart -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <!-- Iconify for Solar Duotone icons -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>
  <body style="background:#fff; color:#1C1917; overflow-x:hidden;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
